name: CI

# CI pipeline for the monorepo. Fast lint gates plus the heavier full-stack gates:
# race-enabled backend tests with a coverage floor, the end-to-end gateway suite
# against a Postgres service, and both production image builds.
#
# Branch protection on `main` decides which checks are REQUIRED to merge. The lint
# jobs are the established required gates; add backend-test, e2e, and images to the
# branch's required status checks to gate merges on the full pipeline.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Go backend
        id: detect
        run: |
          if [ -f backend/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No backend/go.mod yet — skipping Go lint."
          fi

      - name: Set up Go
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: gofmt (check formatting)
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: go vet ./...

      - name: golangci-lint
        if: steps.detect.outputs.present == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend

  frontend-lint:
    name: frontend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Next.js frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend/package.json yet — skipping frontend lint."
          fi

      - name: Set up Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci

      - name: ESLint
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run lint

  # Race-enabled backend tests against a real Postgres, with the coverage gate.
  # Runs the same `make cover` developers run locally.
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DAB_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/dab_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Tests (-race) + coverage gate
        working-directory: backend
        run: make cover

  # The end-to-end gateway suite, run via the same `make e2e` developers run
  # locally, against a Postgres service.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DAB_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/dab_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: End-to-end gateway suite
        working-directory: backend
        run: make e2e

  # Both production images must build from a clean checkout.
  images:
    name: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t dab-backend:ci backend
      - name: Build frontend image
        run: docker build -t dab-frontend:ci frontend
