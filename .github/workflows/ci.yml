name: CI

# Lint-only merge gate. NO tests run here (tests are written TDD-style and run
# locally / in a later CI stage). Branch protection on `main` requires these
# checks to be green before a PR can merge ("merge to repo on green checks").

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Go backend
        id: detect
        run: |
          if [ -f backend/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No backend/go.mod yet — skipping Go lint."
          fi

      - name: Set up Go
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: gofmt (check formatting)
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: go vet ./...

      - name: golangci-lint
        if: steps.detect.outputs.present == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend

  frontend-lint:
    name: frontend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Next.js frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend/package.json yet — skipping frontend lint."
          fi

      - name: Set up Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci

      - name: ESLint
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run lint
